spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/krautAndRueben
    username: krautAndRueben
    password: krautAndRueben

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.flywaydb: DEBUG